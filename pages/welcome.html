<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Attune — Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,700;1,14..32,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,500;0,8..60,700;1,8..60,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../design-system/css-vars.css" />
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/screens.css" />
  </head>
  <body>
    <main class="app-root">
      <div class="device-stage">
        <div class="device-frame" data-node-id="190:844">
          <div class="phone-bg"></div>

          <div class="atmosphere" aria-hidden="true">
            <div
              class="atmosphere-orb orb-top"
              style="background-image: radial-gradient(circle at center, rgba(111,140,255,1) 0%, rgba(111,140,255,0) 70%)"
            ></div>
            <div
              class="atmosphere-orb orb-left"
              style="background-image: radial-gradient(circle at center, rgba(241,161,154,1) 0%, rgba(241,161,154,0) 70%)"
            ></div>
            <div
              class="atmosphere-orb orb-bottom"
              style="background-image: radial-gradient(circle at center, rgba(255,212,184,1) 0%, rgba(255,212,184,0) 70%)"
            ></div>
          </div>

          <div class="status-bar" role="presentation">
            <div class="status-row">
              <div class="status-spacer"></div>
              <div class="status-icons">
                <img
                  class="status-icon"
                  src="../assets/icon-cellular.svg"
                  alt=""
                  width="20"
                  height="13"
                />
                <img
                  class="status-icon"
                  src="../assets/icon-wifi.svg"
                  alt=""
                  width="17"
                  height="13"
                />
                <img
                  class="status-icon"
                  src="../assets/icon-battery.svg"
                  alt=""
                  width="27"
                  height="13"
                />
              </div>
            </div>
          </div>

          <div class="screen-body">
            <div class="welcome-flex">
              <div class="welcome-spacer-top"></div>

              <div class="welcome-title-wrap">
                <h1 class="type-heading-serif-32 text-center">Welcome to Attune</h1>
              </div>

              <div class="w-full" style="padding-bottom: 32px">
                <p class="type-body-15 text-center">
                  Let's learn a bit about you so we can suggest coping strategies that actually fit your
                  life.
                </p>
              </div>

              <div class="w-full" style="padding-bottom: var(--space-32)">
                <div class="glass-card">
                  <p class="type-label-upper">What to expect:</p>

                  <div class="welcome-list-item welcome-first-item">
                    <div class="welcome-list-num"><span>1</span></div>
                    <span class="type-body-15" style="color: var(--color-blues-deep-blue)"
                      >6 quick questions about you</span
                    >
                  </div>

                  <div class="welcome-list-item welcome-mid-item">
                    <div class="welcome-list-num"><span>2</span></div>
                    <span class="type-body-15" style="color: var(--color-blues-deep-blue)"
                      >A check-in about right now</span
                    >
                  </div>

                  <div class="welcome-list-item welcome-mid-item">
                    <div class="welcome-list-num"><span>3</span></div>
                    <span class="type-body-15" style="color: var(--color-blues-deep-blue)"
                      >Personalized strategies for your toolkit</span
                    >
                  </div>
                </div>
              </div>

              <div class="flex-grow"></div>

              <a class="btn-primary full-button" role="button" href="q1.html">
                <span class="type-btn-primary">Get Started</span>
              </a>
            </div>
          </div>

          <div class="home-indicator" aria-hidden="true"></div>
        </div>
      </div>
    </main>
    <script src="../JS/state.js"></script>
    <script src="../JS/Screens/welcome.js"></script>
    <script src="../JS/status-bar.js"></script>
  </body>
</html>
