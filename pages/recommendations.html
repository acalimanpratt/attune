<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Attune — Strategies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,700;1,14..32,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,500;0,8..60,700;1,8..60,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../design-system/css-vars.css" />
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/screens.css" />
  </head>
  <body>
    <main class="app-root">
      <div class="device-stage">
        <div class="device-frame" data-node-id="190:449">
          <div class="phone-bg"></div>

          <div class="atmosphere" aria-hidden="true">
            <div
              class="atmosphere-orb orb-top"
              style="background-image: radial-gradient(circle at center, rgba(111,140,255,1) 0%, rgba(111,140,255,0) 70%)"
            ></div>
            <div
              class="atmosphere-orb orb-left"
              style="background-image: radial-gradient(circle at center, rgba(241,161,154,1) 0%, rgba(241,161,154,0) 70%)"
            ></div>
            <div
              class="atmosphere-orb orb-bottom"
              style="background-image: radial-gradient(circle at center, rgba(255,212,184,1) 0%, rgba(255,212,184,0) 70%)"
            ></div>
          </div>

          <div class="status-bar" role="presentation">
            <div class="status-row">
              <div class="status-spacer"></div>
              <div class="status-icons">
                <img class="status-icon" src="../assets/icon-cellular.svg" alt="" width="20" height="13" />
                <img class="status-icon" src="../assets/icon-wifi.svg" alt="" width="17" height="13" />
                <img class="status-icon" src="../assets/icon-battery.svg" alt="" width="27" height="13" />
              </div>
            </div>
          </div>

          <div class="screen-body">
            <div class="w-full recommendation-page">
              <div class="w-full" style="padding-bottom: 8px">
                <h2 class="type-heading-serif-28">
                  <span>Your personalized</span><br />
                  <span>strategies</span>
                </h2>
              </div>

              <div class="w-full" style="padding-bottom: 24px">
                <p class="type-body-15">Based on your profile and how you're feeling right now</p>
              </div>

              
              <div class="recommendation-scroll">
                <div class="recommendation-loading" data-loading-state>
                  <div class="strategy-card">
                    <div class="strategy-content">
                      <p class="type-body-15">
                        Creating your personalized coping strategy cards...
                      </p>
                    </div>
                  </div>
                </div>
              
                <div class="recommendation-list is-hidden" data-recommendations-list></div>
              
                <div class="recommendation-error is-hidden" data-error-state>
                  <div class="strategy-card">
                    <div class="strategy-content">
                      <p class="type-body-15">
                        Something went wrong while creating your recommendations. Please try again.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
              <div class="recommendation-actions">
                <p class="type-caption-upper text-center" style="padding-bottom: 16px" data-selected-count>
                  2 strategies selected for your toolkit
                </p>
                <div class="btn-row">
                  <a class="btn-secondary" role="button" href="profile-built.html">
                    <span class="type-btn-secondary">Back</span>
                  </a>
                  <a class="btn-primary" role="button" href="welcome.html">
                    <span class="type-btn-primary">Add to Toolkit</span>
                  </a>
                </div>
              </div>
            </div>
          </div>

          <div class="home-indicator" aria-hidden="true"></div>
        </div>
      </div>
    </main>


    <script src="../JS/state.js"></script>
    <script src="../JS/Screens/recommendations.js"></script>
    <script src="../JS/status-bar.js"></script>
  </body>
</html>
